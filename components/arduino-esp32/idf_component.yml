description: "Arduino core for ESP32, ESP32-C, ESP32-H, ESP32-P, ESP32-S series of SoCs"
url: "https://github.com/espressif/arduino-esp32"
license: "LGPL-2.1"
targets:  
  - esp32s3
tags:
  - arduino
files:
  include:    
    - "variants/esp32s3/**/*"
  exclude:
    - ".*" # All files in the root directory that start with a dot.
    - ".gitlab/"
    - ".gitlab/**/*"
    - "docs/"
    - "docs/**/*"
    - "idf_component_examples/"
    - "idf_component_examples/**/*"
    - "package/"
    - "package/**/*"
    - "tests/"
    - "tests/**/*"
    - "tools/"
    - "tools/**/*"
    - "variants/**/*"
    - "boards.txt"
    - "CODE_OF_CONDUCT.md"
    - "LICENSE.md"
    - "package.json"
    - "platform.txt"
    - "programmers.txt"
dependencies:
  idf: ">=5.3,<6.2"      
  joltwallet/littlefs:
    version: "^1.22.1"  
examples:  
  - path: ./idf_component_examples/hello_world  
